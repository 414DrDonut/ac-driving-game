<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Highway Dodger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 24px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-weight: bold;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border: 2px solid #0f0;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 1000;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverScreen h1 {
            color: #f00;
            font-size: 72px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #f00;
        }

        #gameOverScreen .stat {
            color: #0f0;
            font-size: 32px;
            margin: 15px;
            text-shadow: 0 0 10px #0f0;
        }

        #gameOverScreen button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 28px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            pointer-events: auto;
            transition: all 0.3s;
        }

        #gameOverScreen button:hover {
            background: #0a0;
            transform: scale(1.05);
        }

        #nameInputScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 1001;
        }

        #nameInputScreen h1 {
            color: #0f0;
            font-size: 48px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px #0f0;
        }

        #nameInputScreen input {
            padding: 15px 20px;
            font-size: 24px;
            width: 300px;
            background: #1a1a1a;
            color: #0f0;
            border: 2px solid #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        #nameInputScreen button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            pointer-events: auto;
        }

        #pauseScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 999;
        }

        #pauseScreen.show {
            display: flex;
        }

        #pauseScreen h1 {
            color: #ff0;
            font-size: 64px;
            text-shadow: 0 0 20px #ff0;
        }

        .boost-bar {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .boost-slot {
            width: 20px;
            height: 20px;
            background: #333;
            border: 2px solid #0f0;
        }

        .boost-slot.active {
            background: #ff0;
            box-shadow: 0 0 10px #ff0;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border: 2px solid #0f0;
            font-size: 16px;
            color: #0f0;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="hud">
            <div class="hud-item">Player: <span id="playerName">-</span></div>
            <div class="hud-item">Score: <span id="score">0</span></div>
            <div class="hud-item">Multiplier: <span id="multiplier">1.0x</span></div>
            <div class="hud-item">Time: <span id="time">0</span>s</div>
            <div class="hud-item">
                Boosts: <span id="boostCount">3</span>
                <div class="boost-bar" id="boostBar">
                    <div class="boost-slot active"></div>
                    <div class="boost-slot active"></div>
                    <div class="boost-slot active"></div>
                </div>
            </div>
        </div>

        <div id="controls">
            <strong>CONTROLS:</strong><br>
            ← / A, → / D: Move<br>
            SPACE: Boost<br>
            P: Pause<br>
            R: Restart
        </div>
    </div>

    <div id="nameInputScreen">
        <h1>🏁 3D HIGHWAY DODGER 🏁</h1>
        <input type="text" id="playerNameInput" placeholder="Enter your name..." maxlength="15">
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="pauseScreen">
        <h1>⏸ PAUSED ⏸</h1>
    </div>

    <div id="gameOverScreen">
        <h1>💀 GAME OVER 💀</h1>
        <div class="stat">Player: <span id="finalPlayerName">-</span></div>
        <div class="stat">Final Score: <span id="finalScore">0</span></div>
        <div class="stat">Multiplier: <span id="finalMultiplier">1.0x</span></div>
        <div class="stat">Survival Time: <span id="finalTime">0</span>s</div>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        scene.fog = new THREE.Fog(0x87ceeb, 500, 1000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 10, 30);
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(100, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -200;
        directionalLight.shadow.camera.right = 200;
        directionalLight.shadow.camera.top = 200;
        directionalLight.shadow.camera.bottom = -200;
        scene.add(directionalLight);

        // Road
        const roadGeometry = new THREE.PlaneGeometry(80, 2000);
        const roadMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const road = new THREE.Mesh(roadGeometry, roadMaterial);
        road.rotation.x = -Math.PI / 2;
        road.position.z = 0;
        road.receiveShadow = true;
        scene.add(road);

        // Lane lines
        for (let i = 0; i < 100; i++) {
            const lineGeometry = new THREE.PlaneGeometry(2, 10);
            const lineMaterial = new THREE.MeshLambertMaterial({ color: 0xffff00 });
            const line = new THREE.Mesh(lineGeometry, lineMaterial);
            line.rotation.x = -Math.PI / 2;
            line.position.y = 0.01;
            line.position.z = i * 20 - 500;
            scene.add(line);
        }

        // Game state
        let gameState = {
            playerName: '',
            score: 0,
            multiplier: 1.0,
            time: 0,
            gameRunning: false,
            paused: false,
            boosts: 3,
            maxBoosts: 3
        };

        // Player car
        const playerCar = createCar(0xffff00);
        playerCar.position.set(0, 2, 30);
        playerCar.castShadow = true;
        scene.add(playerCar);

        let playerVelocity = 0;
        let playerBoosting = false;
        let playerBoostTimer = 0;

        // Traffic cars
        let cars = [];
        let carIdCounter = 0;

        // Input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (e.key === 'p' || e.key === 'P') {
                gameState.paused = !gameState.paused;
                document.getElementById('pauseScreen').classList.toggle('show');
            }

            if (e.key === 'r' || e.key === 'R') {
                location.reload();
            }

            if (e.key === ' ') {
                e.preventDefault();
                if (gameState.boosts > 0 && gameState.gameRunning && !gameState.paused) {
                    playerBoosting = true;
                    playerBoostTimer = 150;
                    gameState.boosts--;
                    updateBoostUI();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function createCar(color) {
            const carGroup = new THREE.Group();

            // Body
            const bodyGeometry = new THREE.BoxGeometry(3, 2, 7);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1;
            body.castShadow = true;
            body.receiveShadow = true;
            carGroup.add(body);

            // Cabin
            const cabinGeometry = new THREE.BoxGeometry(2.5, 1.5, 3);
            const cabinMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5 });
            const cabin = new THREE.Mesh(cabinGeometry, cabinMaterial);
            cabin.position.y = 2.2;
            cabin.position.z = -0.5;
            cabin.castShadow = true;
            cabin.receiveShadow = true;
            carGroup.add(cabin);

            // Windows
            const windowGeometry = new THREE.BoxGeometry(0.5, 1, 1.5);
            const windowMaterial = new THREE.MeshStandardMaterial({ color: 0x4488ff, metalness: 0.9, roughness: 0.1 });
            
            const window1 = new THREE.Mesh(windowGeometry, windowMaterial);
            window1.position.set(-1.3, 2.5, -0.5);
            carGroup.add(window1);

            const window2 = new THREE.Mesh(windowGeometry, windowMaterial);
            window2.position.set(1.3, 2.5, -0.5);
            carGroup.add(window2);

            // Wheels
            const wheels = [];
            for (let i = 0; i < 4; i++) {
                const wheelGeometry = new THREE.CylinderGeometry(0.8, 0.8, 0.4, 16);
                const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.5 });
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.x = i < 2 ? -1.5 : 1.5;
                wheel.position.y = 0.8;
                wheel.position.z = i % 2 === 0 ? -2 : 2;
                wheel.castShadow = true;
                wheel.receiveShadow = true;
                carGroup.add(wheel);
                wheels.push(wheel);
            }

            // Headlights
            const headlightGeometry = new THREE.SphereGeometry(0.3, 8, 8);
            const headlightMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffff00 });
            
            const headlight1 = new THREE.Mesh(headlightGeometry, headlightMaterial);
            headlight1.position.set(-1, 0.8, 3.5);
            carGroup.add(headlight1);

            const headlight2 = new THREE.Mesh(headlightGeometry, headlightMaterial);
            headlight2.position.set(1, 0.8, 3.5);
            carGroup.add(headlight2);

            carGroup.wheels = wheels;
            return carGroup;
        }

        function startGame() {
            const nameInput = document.getElementById('playerNameInput').value.trim();
            if (nameInput === '') return;

            gameState.playerName = nameInput;
            document.getElementById('playerNameInput').value = '';
            document.getElementById('nameInputScreen').style.display = 'none';

            gameState.gameRunning = true;
            gameState.score = 0;
            gameState.multiplier = 1.0;
            gameState.time = 0;
            gameState.boosts = 3;
            cars = [];

            updateHUD();
            gameLoop();
        }

        function updateHUD() {
            document.getElementById('playerName').textContent = gameState.playerName;
            document.getElementById('score').textContent = Math.floor(gameState.score);
            document.getElementById('multiplier').textContent = gameState.multiplier.toFixed(1) + 'x';
            document.getElementById('time').textContent = Math.floor(gameState.time);
        }

        function updateBoostUI() {
            const bar = document.getElementById('boostBar');
            bar.innerHTML = '';
            for (let i = 0; i < gameState.maxBoosts; i++) {
                const slot = document.createElement('div');
                slot.className = 'boost-slot' + (i < gameState.boosts ? ' active' : '');
                bar.appendChild(slot);
            }
            document.getElementById('boostCount').textContent = gameState.boosts;
        }

        function spawnCar() {
            const lanes = [-15, -5, 5, 15];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            const color = Math.random() > 0.5 ? 0xff0000 : 0x0000ff;
            const speed = 0.3 + Math.random() * 0.4 + (gameState.time / 300);

            const car = createCar(color);
            car.position.set(lane, 2, -400);
            car.castShadow = true;
            car.userData = {
                id: carIdCounter++,
                speed: speed,
                scored: false
            };
            scene.add(car);
            cars.push(car);
        }

        function updatePlayer() {
            const moveSpeed = playerBoosting ? 0.5 : 0.3;

            if (keys['arrowleft'] || keys['a']) {
                playerCar.position.x -= moveSpeed;
            }
            if (keys['arrowright'] || keys['d']) {
                playerCar.position.x += moveSpeed;
            }

            playerCar.position.x = Math.max(-30, Math.min(30, playerCar.position.x));

            // Rotate car based on movement
            if (keys['arrowleft'] || keys['a']) {
                playerCar.rotation.z = 0.2;
            } else if (keys['arrowright'] || keys['d']) {
                playerCar.rotation.z = -0.2;
            } else {
                playerCar.rotation.z *= 0.9;
            }

            if (playerBoosting) {
                playerBoostTimer--;
                if (playerBoostTimer <= 0) {
                    playerBoosting = false;
                }
            }

            // Update camera to follow player
            camera.position.x = playerCar.position.x * 0.5;
            camera.position.z = playerCar.position.z + 30;
            camera.lookAt(playerCar.position.x, 5, playerCar.position.z - 10);
        }

        function updateCars() {
            for (let i = cars.length - 1; i >= 0; i--) {
                cars[i].position.z += cars[i].userData.speed;

                // Rotate wheels
                if (cars[i].wheels) {
                    for (let wheel of cars[i].wheels) {
                        wheel.rotation.x += cars[i].userData.speed / 0.8;
                    }
                }

                if (cars[i].position.z > playerCar.position.z + 50) {
                    if (!cars[i].userData.scored) {
                        gameState.score += 10 * gameState.multiplier;
                        gameState.multiplier = Math.min(2.0, gameState.multiplier + 0.05);
                        cars[i].userData.scored = true;
                    }
                }

                if (cars[i].position.z > 100) {
                    scene.remove(cars[i]);
                    cars.splice(i, 1);
                }
            }
        }

        function checkCollisions() {
            for (let car of cars) {
                const dx = playerCar.position.x - car.position.x;
                const dz = playerCar.position.z - car.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                if (distance < 4) {
                    endGame();
                }
            }
        }

        function endGame() {
            gameState.gameRunning = false;
            document.getElementById('gameOverScreen').classList.add('show');
            document.getElementById('finalPlayerName').textContent = gameState.playerName;
            document.getElementById('finalScore').textContent = Math.floor(gameState.score);
            document.getElementById('finalMultiplier').textContent = gameState.multiplier.toFixed(1) + 'x';
            document.getElementById('finalTime').textContent = Math.floor(gameState.time);
        }

        let lastSpawnTime = 0;

        function gameLoop() {
            requestAnimationFrame(gameLoop);

            if (!gameState.gameRunning) return;

            if (!gameState.paused) {
                gameState.time += 0.016;

                updatePlayer();
                updateCars();
                checkCollisions();

                // Spawn new cars
                if (gameState.time - lastSpawnTime > 0.8 - Math.min(0.5, gameState.time / 100)) {
                    spawnCar();
                    lastSpawnTime = gameState.time;
                }

                updateHUD();
            }

            renderer.render(scene, camera);
        }

        updateBoostUI();
    </script>
</body>
</html>
